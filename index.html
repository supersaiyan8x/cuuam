<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Cửu Âm Chân Kinh - Wiki Bí Kíp</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Kho lưu trữ võ học, nội công, kinh mạch Cửu Âm Chân Kinh">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
CSS
<style>
  /* 1. Đổi tông màu chủ đạo của toàn bộ chữ trong bài viết */
  body {
    color: #2c3e50 !important; /* Xanh xám trầm */
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.8; /* Khoảng cách dòng thoáng giúp dễ đọc bí kíp dài */
  }

  /* 2. Đổi màu tiêu đề chính (Dòng chữ trong ảnh bạn gửi) */
  .markdown-section h1 {
    color: #2c3e50 !important;
    font-weight: 700;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #eee; /* Gạch chân mờ cho sang trọng */
  }

  /* 3. Đổi màu các tiêu đề phụ (H2, H3 - Võ công, Nội công) */
  .markdown-section h2, .markdown-section h3 {
    color: #34495e !important; /* Nhẹ hơn h1 một chút để phân cấp */
    margin-top: 2rem;
  }

  /* 4. Đổi màu các đường link để cùng tông nhưng nổi bật hơn */
  .markdown-section a {
    color: #3498db; /* Xanh biển nhẹ nhàng cho link */
    text-decoration: none;
  }
  
  .markdown-section a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div id="app">Đang khởi tạo tâm pháp...</div>
  
  <script>
    window.$docsify = {
      name: 'Cửu Âm Wiki',
      repo: '',
      loadSidebar: true,    // Bật menu bên trái từ file _sidebar.md
      subMaxLevel: 3,       // Hiển thị các tiêu đề H2, H3 vào menu
      auto2top: true,       // Tự cuộn lên đầu trang khi chuyển bài
      coverpage: false,     // Có thể bật trang bìa nếu muốn (true)
      
      // Cấu hình thanh tìm kiếm
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm võ học, nội công...',
        noData: 'Không tìm thấy bí kíp này!',
        depth: 6
      },
      
      // Định danh file sidebar cho các thư mục con
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      
      // Cấu hình hiển thị Hán-Việt tốt hơn
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
