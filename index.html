<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Cửu Âm Chân Kinh - Wiki Bí Kíp</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Kho lưu trữ võ học, nội công, kinh mạch Cửu Âm Chân Kinh">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
CSS
<style>
  :root {
    /* Màu chủ đạo cho toàn trang: Xanh Ngọc Bích Đậm (Nhã nhặn, sang trọng) */
    --theme-color: #00695c; 
  }

  /* 1. Nền trắng tinh khôi */
  body {
    background-color: #ffffff !important;
    color: #37474f; /* Chữ nội dung màu xanh đen than (dịu mắt) */
    font-family: 'Segoe UI', Roboto, sans-serif;
    line-height: 1.8;
  }

  /* 2. Tiêu đề chính (Dòng trong ảnh của bạn) - Màu Xanh Nhã Nhặn */
  .markdown-section h1 {
    color: #004d40 !important; /* Xanh đậm sắc nét, không hề có sắc xám */
    font-weight: 700;
    font-size: 2rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #e0f2f1; /* Đường gạch chân xanh nhạt */
    margin-bottom: 1.5rem;
  }

  /* 3. Các tiêu đề phụ (Võ công, Nội công) - Tông xanh nhẹ hơn */
  .markdown-section h2, .markdown-section h3 {
    color: #00796b !important; 
    margin-top: 2rem;
    font-weight: 600;
  }

  /* 4. Thanh Sidebar bên trái */
  .sidebar {
    background-color: #f1f8e9 !important; /* Nền xanh lá cực nhạt cho menu */
    border-right: 1px solid #dcedc8;
  }

  .sidebar-nav li a {
    color: #2e7d32 !important; /* Chữ menu màu xanh lá đậm */
  }

  .sidebar-nav li a:hover {
    color: #004d40 !important;
    font-weight: bold;
  }

  /* 5. Điểm nhấn cho các Danh Từ Hán Việt (Strong) */
  .markdown-section strong {
    color: #004d40;
    background-color: #f0f4f4; /* Nền highlight nhẹ cho danh từ */
    padding: 2px 4px;
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div id="app">Đang khởi tạo tâm pháp...</div>
  
  <script>
    window.$docsify = {
      name: 'Cửu Âm Wiki',
      repo: '',
      loadSidebar: true,    // Bật menu bên trái từ file _sidebar.md
      subMaxLevel: 3,       // Hiển thị các tiêu đề H2, H3 vào menu
      auto2top: true,       // Tự cuộn lên đầu trang khi chuyển bài
      coverpage: false,     // Có thể bật trang bìa nếu muốn (true)
      
      // Cấu hình thanh tìm kiếm
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm võ học, nội công...',
        noData: 'Không tìm thấy bí kíp này!',
        depth: 6
      },
      
      // Định danh file sidebar cho các thư mục con
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      
      // Cấu hình hiển thị Hán-Việt tốt hơn
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
