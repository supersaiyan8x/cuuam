<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Age of Wushu</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Kho lưu trữ võ học, nội công, kinh mạch Cửu Âm Chân Kinh">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="google-site-verification" content="YRKO7nTaOoLdQ7wPenI8FLLAR_25rCSyThf3w4zEXFc" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 1. ÉP NỀN TRẮNG TUYỆT ĐỐI */
  body, 
  section.content, 
  article#main {
    background-color: #ffffff !important;
    background: #ffffff !important;
    color: #2c3e50 !important; /* Chữ nội dung màu xanh đen sâu, dễ đọc */
  }

  .anchor span {
    color: #00796b !important; /* Màu xanh cho các liên kết neo */
  }

  section.cover {
    image-rendering: -webkit-optimize-contrast !important;
    background-size: cover !important;
    background-position: center center !important;
  }

  .markdown-section img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 1em auto;
    transition: transform 0.3s ease;
  }

  .markdown-section p {
    overflow-x: auto;
    line-height: 1.6; /* Tăng khoảng cách dòng cho dễ đọc */
  }
    /* Ép trình duyệt hiển thị ảnh sắc nét nhất */
    image-rendering: -webkit-optimize-contrast !important;
    background-size: cover !important;
    background-position: center center !important;
  }
.markdown-section img {
  max-width: 100%; /* Đảm bảo không tràn màn hình điện thoại */
  height: auto;
  display: block;
  margin: 1em auto;
  transition: transform 0.3s ease; /* Hiệu ứng mượt khi zoom */
}

/* Nếu ảnh thực sự rất rộng, cho phép người dùng cuộn ngang thay vì co nhỏ */
.markdown-section p {
  overflow-x: auto;
}

/* Tùy chỉnh riêng cho các ảnh muốn giữ kích thước lớn */
.markdown-section img[src*="width"] {
  max-width: none !important;
}
  /* Khử bóng mờ mặc định của Docsify trên trang bìa (nếu có) */
  section.cover.has-mask .mask {
    opacity: 0 !important; /* Xóa bỏ lớp phủ màu xám mờ trên ảnh */
  }
  /* 2. TIÊU ĐỀ XANH NHÃ NHẶN (KHÔNG XÁM) */
  .markdown-section h1 {
    color: #ffffff !important; /* Xanh lục bảo đậm - Rất nhã */
    font-weight: 700 !important;
    border-bottom: 2px solid #e0f2f1 !important;
    padding-bottom: 15px !important;
  }

  .markdown-section h2, 
  .markdown-section h3 {
    color: #00796b !important; /* Xanh nhẹ hơn cho mục con */
    margin-top: 30px !important;
  }

  /* 3. THANH MENU BÊN TRÁI (SIDEBAR) */
  .sidebar {
    background-color: #f1f8f7 !important; /* Xanh Teal cực nhạt, gần như trắng nhưng có sắc xanh */
    border-right: 1px solid #e0f2f1 !important; /* Đường kẻ ngăn cách mảnh và tinh tế */
  }

  .sidebar-nav li a {
    color: #004d40 !important;
    font-size: 15px;
  }

  /* 4. ĐIỂM NHẤN CHO CÁC DANH TỪ HÁN VIỆT */
  .markdown-section strong {
    color: #00695c !important;
    font-weight: 600;
  }
  </style>
</head>
<body>
  <div id="app">Đang tải bí kíp...</div>
  
  <script>
    window.$docsify = {
      name: 'Age of Wushu',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      coverpage: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm võ học, nội công...',
        noData: 'Không tìm thấy bí kíp!',
        depth: 6
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
      
      // PLUGIN CHÈN COMMENT VÀO CUỐI MỖI TRANG
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            var content = document.querySelector('section.content');
            if (!content) return;

            // Xóa khung comment cũ để không bị lặp khi bấm qua bài khác
            var oldCusdis = document.getElementById('cusdis_thread');
            if (oldCusdis) oldCusdis.remove();

            // Tạo khung comment mới
            var container = document.createElement('div');
            container.id = 'cusdis_thread';
            container.setAttribute('data-host', 'https://cusdis.com');
            container.setAttribute('data-app-id', 'e018e634-2325-465f-9c9d-660e80a1fad3');
            container.setAttribute('data-page-id', vm.route.path);
            container.setAttribute('data-page-url', window.location.href);
            container.setAttribute('data-page-title', vm.route.path);
            
            content.appendChild(container);

            // Chèn script Cusdis
            var script = document.createElement('script');
            script.src = 'https://cusdis.com/js/cusdis.es.js';
            script.async = true;
            script.defer = true;
            document.body.appendChild(script);
            
            // Kích hoạt lại script nếu đã có sẵn trong bộ nhớ trình duyệt
            if (window.CUSDIS) {
              window.CUSDIS.initial();
            }
          });
        }
      ]
    }; // Kết thúc window.$docsify
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
