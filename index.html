<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Age of Wushu</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Kho lưu trữ võ học, nội công, kinh mạch Cửu Âm Chân Kinh">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" 
    href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* 1. NỀN TRẮNG VÀ CHỮ XANH ĐEN (SỬA LỖI TÀNG HÌNH) */
  body, 
  section.content, 
  article#main {
    background-color: #ffffff !important;
    background: #ffffff !important;
    color: #2c3e50 !important; /* Chữ nội dung màu xanh đen sâu, dễ đọc */
  }

  .anchor span {
    color: #00796b !important; /* Màu xanh cho các liên kết neo */
  }

  section.cover {
    image-rendering: -webkit-optimize-contrast !important;
    background-size: cover !important;
    background-position: center center !important;
  }

  .markdown-section img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 1em auto;
    transition: transform 0.3s ease;
  }

  .markdown-section p {
    overflow-x: auto;
    line-height: 1.6; /* Tăng khoảng cách dòng cho dễ đọc */
  }

  /* 2. TIÊU ĐỀ XANH LỤC BẢO (TEAL) - ĐÃ SỬA MÀU TRẮNG THÀNH XANH */
  .markdown-section h1 {
    color: #004d40 !important; /* Xanh lục bảo đậm nhất cho tiêu đề chính */
    font-weight: 700 !important;
    border-bottom: 2px solid #e0f2f1 !important;
    padding-bottom: 15px !important;
  }

  .markdown-section h2, 
  .markdown-section h3 {
    color: #00796b !important; /* Xanh Teal nhã nhặn cho mục con */
    margin-top: 30px !important;
  }

  /* 3. THANH MENU BÊN TRÁI (SIDEBAR) */
  .sidebar {
    background-color: #ffffff !important;
    border-right: 1px solid #f0f0f0 !important;
  }

  .sidebar-nav li a {
    color: #004d40 !important;
    font-size: 15px;
  }

  /* Màu khi di chuột qua menu hoặc đang chọn */
  .sidebar-nav li a:hover,
  .sidebar-nav li.active > a {
    color: #00bfa5 !important;
    font-weight: bold;
    border-right: 2px solid #00bfa5;
  }

  /* 4. ĐIỂM NHẤN CHO CÁC DANH TỪ HÁN VIỆT (Chữ đậm) */
  .markdown-section strong {
    color: #00695c !important; /* Xanh rừng già cho các từ nhấn mạnh */
    font-weight: 600;
  }

  /* Tùy chỉnh thanh tìm kiếm cho đồng bộ màu */
  .search input {
    color: #004d40 !important;
  }

/* Đổi toàn bộ chữ trong menu thành màu trắng/xám nhạt */
.sidebar-nav li a, 
.sidebar-nav strong {
  color: #e0f2f1 !important;
}

/* Khi di chuột qua hoặc đang chọn mục đó */
.sidebar-nav li a:hover,
.sidebar-nav li.active > a {
  color: #ffffff !important;
  font-weight: bold !important;
  background-color: #00695c !important; /* Đậm hơn một chút khi chọn */
}
/* Thêm màu sắc riêng cho mục Nạp VIP để nổi bật hẳn lên */
.sidebar-nav a[href*="napbvip"] {
    color: #e53935 !important; /* Màu đỏ đậm cho nạp tiền */
}
</style>
</head>
<body>
  <div id="app">Đang update...</div>
  
  <script>
    window.$docsify = {
      name: 'Age of Wushu',
      repo: '',
      loadSidebar: true,    // Bật menu bên trái từ file _sidebar.md
      subMaxLevel: 3,       // Hiển thị các tiêu đề H2, H3 vào menu
      auto2top: true,       // Tự cuộn lên đầu trang khi chuyển bài
      coverpage: true,     // Có thể bật trang bìa nếu muốn (true)
      
      // Cấu hình thanh tìm kiếm
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm võ học, nội công...',
        noData: 'Không tìm thấy bí kíp này!',
        depth: 6
      },
      
      // Định danh file sidebar cho các thư mục con
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      
      // Cấu hình hiển thị Hán-Việt tốt hơn
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
