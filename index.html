<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Kho lưu trữ võ học, nội công, kinh mạch Cửu Âm Chân Kinh">
  <meta name="theme-color" content="#00796b">
  <meta name="google-site-verification" content="YRKO7nTaOoLdQ7wPenI8FLLAR_25rCSyThf3w4zEXFc">

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cusdis.com">

  <title>Age of Wushu</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* ===== BIẾN MÀU ===== */
    :root {
      --color-primary:    #00796b;
      --color-primary-dk: #004d40;
      --color-primary-lt: #e0f2f1;
      --color-accent:     #00695c;
      --color-bg:         #ffffff;
      --color-text:       #2c3e50;
      --color-sidebar-bg: #f1f8f7;
    }

    body,
    section.content,
    article#main {
      background-color: var(--color-bg) !important;
      color: var(--color-text) !important;
    }

    .markdown-section h1 {
      color: #ffffff !important;
      font-weight: 700 !important;
      border-bottom: 2px solid var(--color-primary-lt) !important;
      padding-bottom: 15px !important;
    }

    .markdown-section h2,
    .markdown-section h3 {
      color: var(--color-primary) !important;
      margin-top: 30px !important;
    }

    .sidebar {
      background-color: var(--color-sidebar-bg) !important;
      border-right: 1px solid var(--color-primary-lt) !important;
    }

    .sidebar-nav li a {
      color: var(--color-primary-dk) !important;
      font-size: 15px;
    }

    .markdown-section strong {
      color: var(--color-accent) !important;
      font-weight: 600;
    }

    .anchor span {
      color: var(--color-primary) !important;
    }

    .markdown-section img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1em auto;
      transition: transform 0.3s ease;
    }

    .markdown-section p {
      overflow-x: auto;
      line-height: 1.6;
    }

    section.cover.has-mask .mask {
      opacity: 0 !important;
    }

    @media (max-width: 768px) {
      .sidebar-nav li a { font-size: 14px; }
      .markdown-section h2,
      .markdown-section h3 { margin-top: 20px !important; }
    }

    /* ===== COVER PAGE BUTTONS ===== */
    section.cover .cover-main a {
      background-color: var(--color-primary-lt) !important;
      color: var(--color-primary-dk) !important;
      border: 2px solid var(--color-primary-lt) !important;
      transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease !important;
    }

    section.cover .cover-main a:hover {
      background-color: var(--color-primary) !important;
      color: #fff !important;
      border-color: var(--color-primary) !important;
    }

    /* ===== PAGINATION ===== */

    /* Ẩn toàn bộ nội dung gốc đã được gom vào plugin */
    .pg-source-hidden {
      display: none !important;
    }

    .pg-wrapper {
      margin: 16px 0;
    }

    /* Thanh trên: tổng số + dropdown */
    .pg-controls-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pg-count {
      font-size: 13px;
      color: #607d8b;
    }

    .pg-perpage {
      font-size: 13px;
      color: #607d8b;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pg-perpage select {
      font-size: 13px;
      padding: 3px 8px;
      border: 1px solid #b2dfdb;
      border-radius: 4px;
      background: #fff;
      color: #2c3e50;
      cursor: pointer;
    }

    /* Vùng hiển thị các bài */
    .pg-items ul {
      list-style: disc;
      padding-left: 1.5em;
      margin: 0;
    }

    .pg-items ul li {
      padding: 5px 0;
      line-height: 1.7;
      border-bottom: 1px dashed #e0f2f1;
    }

    .pg-items ul li:last-child {
      border-bottom: none;
    }

    /* Nút phân trang */
    .pg-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .pg-nav button {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #b2dfdb;
      border-radius: 4px;
      background: #fff;
      color: #004d40;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .pg-nav button:hover:not(:disabled) {
      background: var(--color-primary-lt);
    }

    .pg-nav button.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
      font-weight: 600;
    }

    .pg-nav button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .pg-nav .pg-dots {
      min-width: 24px;
      text-align: center;
      color: #90a4ae;
      font-size: 13px;
      border: none !important;
      background: none !important;
      cursor: default;
    }
  </style>
</head>
<body>
  <div id="app">Đang tải bí kíp...</div>

  <script>
    window.$docsify = {
      name: 'Age of Wushu',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      coverpage: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm võ học, nội công...',
        noData: 'Không tìm thấy bí kíp!',
        depth: 6
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      formatUpdated: '{MM}/{DD} {HH}:{mm}',

      plugins: [
        /* ── Plugin 1: Cusdis comment ── */
        function (hook, vm) {
          var cusdisLoaded = false;

          function loadCusdisScript() {
            if (cusdisLoaded) return;
            cusdisLoaded = true;
            var script = document.createElement('script');
            script.src = 'https://cusdis.com/js/cusdis.es.js';
            script.async = true;
            script.defer = true;
            document.body.appendChild(script);
          }

          hook.doneEach(function () {
            var content = document.querySelector('section.content');
            if (!content) return;

            var old = document.getElementById('cusdis_thread');
            if (old) old.remove();

            var container = document.createElement('div');
            container.id = 'cusdis_thread';
            container.setAttribute('data-host', 'https://cusdis.com');
            container.setAttribute('data-app-id', 'e018e634-2325-465f-9c9d-660e80a1fad3');
            container.setAttribute('data-page-id', vm.route.path);
            container.setAttribute('data-page-url', window.location.href);
            container.setAttribute('data-page-title', vm.route.path);
            content.appendChild(container);

            loadCusdisScript();

            if (window.CUSDIS && typeof window.CUSDIS.initial === 'function') {
              window.CUSDIS.initial();
            }
          });
        },

        /* ── Plugin 2: Pagination gom tất cả <li> trong trang ── */
        function (hook) {
          var DEFAULT_PER_PAGE = 20; // Số bài mỗi trang mặc định

          hook.doneEach(function () {
            var section = document.querySelector('.markdown-section');
            if (!section) return;

            /* Lấy tất cả <ul> trong vùng nội dung, bỏ qua sidebar */
            var allUls = Array.from(section.querySelectorAll('ul')).filter(function (ul) {
              return !ul.closest('.sidebar') && !ul.dataset.pgDone;
            });

            if (allUls.length === 0) return;

            /* Gom tất cả <li> từ mọi <ul> vào một mảng duy nhất */
            var allItems = [];
            allUls.forEach(function (ul) {
              Array.from(ul.children).forEach(function (li) {
                /* Chỉ lấy li có chứa link hoặc text thực sự */
                if (li.textContent.trim()) {
                  allItems.push(li.cloneNode(true));
                }
              });
              ul.dataset.pgDone = '1';
            });

            /* Nếu tổng số bài quá ít thì không cần phân trang */
            if (allItems.length <= DEFAULT_PER_PAGE) return;

            /* Ẩn toàn bộ các ul gốc + các h3 tiêu đề tháng đi
               (vì plugin sẽ render lại theo số trang, không theo tháng) */
            allUls.forEach(function (ul) {
              ul.classList.add('pg-source-hidden');
              /* Ẩn luôn heading h3 đứng trước ul đó nếu có */
              var prev = ul.previousElementSibling;
              while (prev && prev.tagName !== 'UL') {
                prev.classList.add('pg-source-hidden');
                prev = prev.previousElementSibling;
                /* Dừng khi gặp h2 hoặc h1 (không ẩn tiêu đề lớn) */
                if (prev && (prev.tagName === 'H1' || prev.tagName === 'H2')) break;
              }
            });

            var perPage = DEFAULT_PER_PAGE;
            var currentPage = 1;

            /* Tạo wrapper chèn vào trước ul đầu tiên */
            var wrapper = document.createElement('div');
            wrapper.className = 'pg-wrapper';
            allUls[0].parentNode.insertBefore(wrapper, allUls[0]);

            /* Thanh trên */
            var topBar = document.createElement('div');
            topBar.className = 'pg-controls-top';

            var countEl = document.createElement('span');
            countEl.className = 'pg-count';

            var perPageLabel = document.createElement('label');
            perPageLabel.className = 'pg-perpage';
            perPageLabel.textContent = 'Hiển thị: ';

            var sel = document.createElement('select');
            [5, 10, 20, 50].forEach(function (n) {
              var opt = document.createElement('option');
              opt.value = n;
              opt.textContent = n + ' bài/trang';
              if (n === DEFAULT_PER_PAGE) opt.selected = true;
              sel.appendChild(opt);
            });

            perPageLabel.appendChild(sel);
            topBar.appendChild(countEl);
            topBar.appendChild(perPageLabel);
            wrapper.appendChild(topBar);

            /* Vùng items */
            var itemsEl = document.createElement('div');
            itemsEl.className = 'pg-items';
            wrapper.appendChild(itemsEl);

            /* Thanh nav */
            var nav = document.createElement('div');
            nav.className = 'pg-nav';
            wrapper.appendChild(nav);

            function totalPages() {
              return Math.ceil(allItems.length / perPage);
            }

            function renderItems() {
              var start = (currentPage - 1) * perPage;
              var end = Math.min(start + perPage, allItems.length);
              countEl.textContent = 'Bài ' + (start + 1) + '–' + end + ' / ' + allItems.length + ' bài';

              var ul = document.createElement('ul');
              for (var i = start; i < end; i++) {
                ul.appendChild(allItems[i].cloneNode(true));
              }
              itemsEl.innerHTML = '';
              itemsEl.appendChild(ul);
            }

            function renderNav() {
              nav.innerHTML = '';
              var tp = totalPages();

              function makeBtn(label, page, disabled, active) {
                var b = document.createElement('button');
                b.textContent = label;
                if (active) b.classList.add('active');
                if (disabled) b.disabled = true;
                if (!disabled) {
                  b.addEventListener('click', function () {
                    currentPage = page;
                    renderItems();
                    renderNav();
                    wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
                  });
                }
                return b;
              }

              function makeDots() {
                var b = document.createElement('button');
                b.textContent = '…';
                b.className = 'pg-dots';
                b.disabled = true;
                return b;
              }

              nav.appendChild(makeBtn('←', currentPage - 1, currentPage === 1));

              var pages = [];
              if (tp <= 7) {
                for (var i = 1; i <= tp; i++) pages.push(i);
              } else {
                pages.push(1);
                if (currentPage > 3) pages.push('...');
                var lo = Math.max(2, currentPage - 1);
                var hi = Math.min(tp - 1, currentPage + 1);
                for (var j = lo; j <= hi; j++) pages.push(j);
                if (currentPage < tp - 2) pages.push('...');
                pages.push(tp);
              }

              pages.forEach(function (p) {
                nav.appendChild(p === '...' ? makeDots() : makeBtn(p, p, false, p === currentPage));
              });

              nav.appendChild(makeBtn('→', currentPage + 1, currentPage === tp));
            }

            sel.addEventListener('change', function () {
              perPage = parseInt(this.value);
              currentPage = 1;
              renderItems();
              renderNav();
            });

            renderItems();
            renderNav();
          });
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js" defer></script>
</body>
</html>
