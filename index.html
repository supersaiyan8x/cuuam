<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Cửu Âm Chân Kinh - Wiki Bí Kíp</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Kho lưu trữ võ học, nội công, kinh mạch Cửu Âm Chân Kinh">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root {
      /* Màu chủ đạo: Xanh rêu đậm (phong cách quân tử/kiếm khách) */
      --theme-color: #2E7D32; 
    }

    /* Tùy chỉnh màu nền và chữ */
    body {
      background-color: #ffffff !important; /* Trắng tinh khôi */
      color: #333; /* Chữ xám đậm dễ đọc */
    }

    /* Sidebar (Thanh menu bên trái) */
    .sidebar {
      background-color: #f8f9fa !important; /* Xám cực nhẹ để tách biệt với nội dung */
      border-right: 1px solid #eee;
    }

    /* Làm nổi bật các Danh Từ Hán Việt (In đậm và có màu riêng) */
    .markdown-section strong {
      color: #1b5e20;
    }

    /* Hiệu ứng khi di chuột vào menu */
    .sidebar-nav li a:hover {
      color: var(--theme-color) !important;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">Đang khởi tạo tâm pháp...</div>
  
  <script>
    window.$docsify = {
      name: 'Cửu Âm Wiki',
      repo: '',
      loadSidebar: true,    // Bật menu bên trái từ file _sidebar.md
      subMaxLevel: 3,       // Hiển thị các tiêu đề H2, H3 vào menu
      auto2top: true,       // Tự cuộn lên đầu trang khi chuyển bài
      coverpage: false,     // Có thể bật trang bìa nếu muốn (true)
      
      // Cấu hình thanh tìm kiếm
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm võ học, nội công...',
        noData: 'Không tìm thấy bí kíp này!',
        depth: 6
      },
      
      // Định danh file sidebar cho các thư mục con
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      
      // Cấu hình hiển thị Hán-Việt tốt hơn
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
