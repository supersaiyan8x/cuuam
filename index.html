<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Age of Wushu</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Kho lưu trữ võ học, nội công, kinh mạch Cửu Âm Chân Kinh">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" 
    href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
CSS
<style>
  /* 1. ÉP NỀN TRẮNG TUYỆT ĐỐI */
  body, 
  section.content, 
  article#main,
  .anchor span {
    background-color: #ffffff !important;
    background: #ffffff !important;
    color: #2c3e50 !important; /* Chữ nội dung xanh đen sâu */
  }
section.cover {
    /* Ép trình duyệt hiển thị ảnh sắc nét nhất */
    image-rendering: -webkit-optimize-contrast !important;
    background-size: cover !important;
    background-position: center center !important;
  }
.markdown-section img {
  max-width: 100%; /* Đảm bảo không tràn màn hình điện thoại */
  height: auto;
  display: block;
  margin: 1em auto;
  transition: transform 0.3s ease; /* Hiệu ứng mượt khi zoom */
}

/* Nếu ảnh thực sự rất rộng, cho phép người dùng cuộn ngang thay vì co nhỏ */
.markdown-section p {
  overflow-x: auto;
}

/* Tùy chỉnh riêng cho các ảnh muốn giữ kích thước lớn */
.markdown-section img[src*="width"] {
  max-width: none !important;
}
  /* Khử bóng mờ mặc định của Docsify trên trang bìa (nếu có) */
  section.cover.has-mask .mask {
    opacity: 0 !important; /* Xóa bỏ lớp phủ màu xám mờ trên ảnh */
  }
  /* 2. TIÊU ĐỀ XANH NHÃ NHẶN (KHÔNG XÁM) */
  .markdown-section h1 {
    color: #004d40 !important; /* Xanh lục bảo đậm - Rất nhã */
    font-weight: 700 !important;
    border-bottom: 2px solid #e0f2f1 !important;
    padding-bottom: 15px !important;
  }

  .markdown-section h2, 
  .markdown-section h3 {
    color: #00796b !important; /* Xanh nhẹ hơn cho mục con */
    margin-top: 30px !important;
  }

  /* 3. THANH MENU BÊN TRÁI (SIDEBAR) */
  .sidebar {
    background-color: #ffffff !important; /* Đổi nốt sidebar sang trắng cho đồng bộ */
    border-right: 1px solid #f0f0f0 !important;
  }

  .sidebar-nav li a {
    color: #004d40 !important;
    font-size: 15px;
  }

  /* 4. ĐIỂM NHẤN CHO CÁC DANH TỪ HÁN VIỆT */
  .markdown-section strong {
    color: #00695c !important;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div id="app">Đang update...</div>
  
  <script>
    window.$docsify = {
      name: 'Age of Wushu',
      repo: '',
      loadSidebar: true,    // Bật menu bên trái từ file _sidebar.md
      subMaxLevel: 3,       // Hiển thị các tiêu đề H2, H3 vào menu
      auto2top: true,       // Tự cuộn lên đầu trang khi chuyển bài
      coverpage: true,     // Có thể bật trang bìa nếu muốn (true)
      
      // Cấu hình thanh tìm kiếm
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm võ học, nội công...',
        noData: 'Không tìm thấy bí kíp này!',
        depth: 6
      },
      
      // Định danh file sidebar cho các thư mục con
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      
      // Cấu hình hiển thị Hán-Việt tốt hơn
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
